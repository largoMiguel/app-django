name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: softone
          POSTGRES_USER: softone
          POSTGRES_PASSWORD: ci-test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U softone -d softone"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Backend tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          SECRET_KEY: ci-test-secret-key
          POSTGRES_DB: softone
          POSTGRES_USER: softone
          POSTGRES_PASSWORD: ci-test-password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
        run: |
          pip install -r requirements.txt
          python manage.py migrate --noinput
          python manage.py test

      - name: Frontend build
        working-directory: frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
        run: |
          npm ci
          npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Configure SSH and deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host softone-prod
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.venv' \
            --exclude 'venv' \
            --exclude 'staticfiles' \
            --exclude '.DS_Store' \
            --exclude '.env' \
            --exclude 'deploy/cloudflared/*.json' \
            --exclude 'deploy/keys' \
            --exclude 'deploy/sites/lavonia/www' \
            ./ softone-prod:/opt/softone-app/

          ssh softone-prod 'cd /opt/softone-app && deploy/scripts/deploy.sh'

      - name: Smoke test
        run: |
          curl -fsS https://app.softone360.com/api/health
          curl -fsS -o /dev/null -w "%{http_code}" https://app.softone360.com/correspondencia | grep -q 200
          curl -fsS -o /dev/null -w "%{http_code}" https://app.softone360.com/asistencia/registros | grep -q 200
