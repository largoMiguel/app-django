# Plantilla de configuración del túnel Cloudflare.
# El token va en .env (TUNNEL_TOKEN); cloudflared usa "tunnel run" en modo token,
# así que este archivo es opcional/documental. Si en el futuro se vuelve al modo
# "ingress rules" basado en credenciales JSON, este archivo se monta como config.yml.

tunnel: 1b010f95-dd5a-4236-bd6d-a71c6ef79d15
credentials-file: /etc/cloudflared/creds/1b010f95-dd5a-4236-bd6d-a71c6ef79d15.json

protocol: http2
retries: 5
grace-period: 30s
edge-ip-version: auto

originRequest:
  tcpKeepAlive: 30s
  keepAliveConnections: 100
  keepAliveTimeout: 90s
  connectTimeout: 30s
  noTLSVerify: true

ingress:
  - hostname: softone360.com
    service: http://nginx:80
  - hostname: www.softone360.com
    service: http://nginx:80
  - hostname: app.softone360.com
    service: http://nginx:80
  - hostname: files.softone360.com
    service: http://nginx:80
  # TEMPORAL — Lavonia showcase
  - hostname: lavonia.softone360.com
    service: http://lavonia:80
  - hostname: ssh.softone360.com
    service: ssh://host.docker.internal:22
  - service: http_status:404
