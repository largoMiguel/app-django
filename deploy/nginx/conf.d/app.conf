upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:80;
    keepalive 16;
}

# Headers de seguridad reutilizables
map $sent_http_content_type $csp_header {
    default "default-src 'self'; img-src 'self' data: blob: https: https://files.softone360.com; style-src 'self' 'unsafe-inline'; script-src 'self' https://clerk.softone360.com https://challenges.cloudflare.com; script-src-attr 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://clerk.softone360.com https://files.softone360.com; worker-src 'self' blob:; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';";
}

# CSP para /chat/ — permite embedding en sitios gov.co
map $sent_http_content_type $csp_chat_header {
    default "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'self' https://*.gov.co https://www.gov.co; base-uri 'self'; form-action 'self';";
}

server {
    listen 80 default_server;
    server_name _;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy $csp_header always;

    # Healthcheck para Docker
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Media protegida: validación de token Clerk en Django (ProtectedMediaView)
    location /media/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        client_max_body_size 25m;
    }

    # Webhooks públicos (Clerk, ZeptoMail) — sin rate-limit
    location = /api/v1/webhooks/clerk {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    location = /api/v1/webhooks/zeptomail {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    # API
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 25m;
    }

    # Chat PDM público — permite iframe desde gov.co
    location /chat/ {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy $csp_chat_header always;
    }

    # Embed launcher JS (gov.co)
    location /embed/ {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        expires 1d;
        add_header Cache-Control "public";
    }

    # Archivos B2 con URL firmada (files.softone360.com o app.softone360.com)
    location ~ ^/softone-(pqrs|pdm)/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SPA
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }
}
